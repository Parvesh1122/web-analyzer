<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>All-in-One Website Tester</title>

    <link rel="icon" href="{{ url_for('static', filename='logo.webp') }}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column; /* 🔥 IMPORTANT */
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a, #312e81, #9333ea);
        color: white;
        font-family: Arial;
      }

      .logo {
        width: 120px;
        border-radius: 50%;
        margin-bottom: 5px;
      }

      .main-title {
        font-size: 42px;
        font-weight: 700;
      }

      .subtitle {
        color: #e5e7eb;
        font-size: 18px;
        margin-bottom: 30px;
      }

      .glass-box {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        padding: 25px;
        border-radius: 12px;
      }

      .drag-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.95);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: bold;
        border: 4px dashed #60a5fa;
        color: #60a5fa;
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
      }

      .drag-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>

  <body>
    <section>
      <div class="container-fluid mt-5 px-5">
        <div class="glass-box">
          <!-- HEADER -->
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">Website Performance Report</h3>
            <span class="badge bg-success px-3 py-2">Analyzed</span>
          </div>

          <!-- SCORE CARDS -->
          <div class="row text-center mb-4">
            <div class="col-md-3 mb-3">
              <div class="p-3 rounded bg-dark bg-opacity-50">
                <h5>Performance</h5>
                <h2 class="fw-bold text-info">{{ performance }}</h2>
              </div>
            </div>

            <div class="col-md-3 mb-3">
              <div class="p-3 rounded bg-dark bg-opacity-50">
                <h5>Accessibility</h5>
                <h2 class="fw-bold text-warning">{{ accessibility }}</h2>
              </div>
            </div>

            <div class="col-md-3 mb-3">
              <div class="p-3 rounded bg-dark bg-opacity-50">
                <h5>Best Practices</h5>
                <h2 class="fw-bold text-success">{{ best_practices }}</h2>
              </div>
            </div>

            <div class="col-md-3 mb-3">
              <div class="p-3 rounded bg-dark bg-opacity-50">
                <h5>SEO</h5>
                <h2 class="fw-bold text-primary">{{ seo }}</h2>
              </div>
            </div>
          </div>

          <!-- PROGRESS BARS -->
          <div class="mb-4">
            <p class="mb-1">Performance</p>
            <div class="progress mb-3">
              <div
                class="progress-bar bg-info"
                style="width: {{ performance }}%"
              ></div>
            </div>

            <p class="mb-1">Accessibility</p>
            <div class="progress mb-3">
              <div
                class="progress-bar bg-warning"
                style="width: {{ accessibility }}%"
              ></div>
            </div>

            <p class="mb-1">Best Practices</p>
            <div class="progress mb-3">
              <div
                class="progress-bar bg-success"
                style="width: {{ best_practices }}%"
              ></div>
            </div>

            <p class="mb-1">SEO</p>
            <div class="progress mb-3">
              <div
                class="progress-bar bg-primary"
                style="width: {{ seo }}%"
              ></div>
            </div>
          </div>

          <!-- OVERALL SCORE -->
          <div class="text-center mt-4">
            <div
              style="
                width: 120px;
                height: 120px;
                border-radius: 50%;
                margin: auto;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 28px;
                font-weight: bold;
                background: radial-gradient(circle, #1e293b, #0f172a);
                border: 5px solid #60a5fa;
                box-shadow: 0 0 25px rgba(96, 165, 250, 0.6);
              "
            >
              {{ overall }}
            </div>
            <p class="mt-2">Overall Score</p>
          </div>
        </div>
      </div>
    </section>

    <script>
      const overlay = document.getElementById("dragOverlay");
      const fileInput = document.getElementById("fileInput");

      document.addEventListener("dragover", (e) => {
        e.preventDefault();
        overlay.classList.add("active");
      });

      document.addEventListener("dragleave", () => {
        overlay.classList.remove("active");
      });

      document.addEventListener("drop", (e) => {
        e.preventDefault();
        overlay.classList.remove("active");
        fileInput.files = e.dataTransfer.files;
      });
    </script>
  </body>
</html>
